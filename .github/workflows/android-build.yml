name: Android CI - Kargathra

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Java JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    # Step 3: Explicitly set the SDK path for pre-installed Android SDK on Ubuntu
    - name: Set Android SDK Environment Variable
      run: |
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

    # Step 4: Fix script execution permissions
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Step 5: Build the debug APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # Step 6: Upload the generated APK
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kargathra-v0.1.0-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
