name: Android CI - Kargathra

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Set Android SDK Environment Variable
      run: |
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

    # Dynamically find where gradlew actually lives and step into its directory
    - name: Locate and Build Project
      run: |
        GRADLE_PATH=$(find . -name gradlew -print -quit)
        if [ -z "$GRADLE_PATH" ]; then
          echo "ERROR: Could not find gradlew file anywhere in the repository!"
          exit 1
        fi
        
        # Get the directory containing gradlew
        PROJECT_DIR=$(dirname "$GRADLE_PATH")
        echo "Found gradlew in: $PROJECT_DIR"
        
        # Move into that directory, fix permissions, and run the build
        cd "$PROJECT_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    # Finds the output APK dynamically even if nested
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kargathra-v0.1.0-Debug
        path: "**/build/outputs/apk/debug/app-debug.apk"
